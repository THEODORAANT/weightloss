<perch:form id="password" method="post" app="perch_members" class="d-flex flex-column gap-3">
  <div class="mb-3">
    <perch:label class="form-label" for="old_password">Current password</perch:label>
    <perch:input class="form-control required" type="password" id="old_password" required="true" />
    <perch:error class="error-message text-danger" for="old_password" type="required">Please enter your current password.</perch:error>
    <perch:error class="error-message text-danger" for="old_password" type="valid">That password does not match our records.</perch:error>
  </div>

  <div class="mb-3">
    <perch:label class="form-label" for="password">New password</perch:label>
    <perch:input class="form-control required" type="password" id="password" required="true" match-with="password2" />
    <perch:error class="error-message text-danger" for="password" type="required">Please enter a new password.</perch:error>
    <perch:error class="error-message text-danger" for="password" type="match">Passwords do not match.</perch:error>
  </div>

  <div class="mb-3">
    <perch:label class="form-label" for="password2">Confirm new password</perch:label>
    <perch:input class="form-control required" type="password" id="password2" required="true" />
    <perch:error class="error-message text-danger" for="password2" type="required">Please confirm your new password.</perch:error>
  </div>

  <div class="mb-1">
    <perch:input type="submit" value="Save new password" class="btn btn-primary w-100" />
    <perch:input type="hidden" id="token" />
  </div>

  <perch:success>
    <p class="text-success mb-0">Your password has been updated successfully.</p>
  </perch:success>
</perch:form>
